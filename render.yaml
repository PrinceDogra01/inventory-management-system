services:
  # Backend API
  - type: web
    name: inventory-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend
  - type: web
    name: inventory-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://inventory-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
